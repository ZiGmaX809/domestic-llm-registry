name: Update Domestic LLM Models

on:
  # 定时触发 - 每天北京时间上午10点 (UTC 02:00)
  schedule:
    - cron: '0 2 * * *'

  # 手动触发
  workflow_dispatch:

  # Push 时触发（可选）
  push:
    branches:
      - main
    paths:
      - 'fetch_domestic_models.py'
      - '.github/workflows/update-models.yml'

jobs:
  update-models:
    name: Fetch and Update Models
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      has_changes: ${{ steps.check_changes.outputs.changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch domestic models
        run: |
          echo "🚀 开始获取国产模型数据..."
          python fetch_domestic_models.py

      - name: Show statistics
        run: |
          echo "📊 模型统计信息:"
          echo "================================"
          python3 -c "
          import json
          with open('output/domestic_llm_models.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          metadata = data['metadata']
          print(f\"版本: {metadata['version']}\")
          print(f\"更新时间: {metadata['last_updated']}\")
          print(f\"模型总数: {metadata['total_models']}\")
          print(f\"文件大小: {len(json.dumps(data, ensure_ascii=False)) / 1024:.2f} KB\")
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domestic-llm-models-${{ github.run_number }}
          path: output/domestic_llm_models.json
          retention-days: 30

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Check for changes
        id: check_changes
        run: |
          # 添加文件到git
          git add output/domestic_llm_models.json

          # 检查是否有变化
          if git diff --cached --quiet output/domestic_llm_models.json; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ 模型数据未发生变化"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到模型数据变化"
            git diff --cached --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          MODEL_COUNT=$(python3 -c "import json; print(json.load(open('output/domestic_llm_models.json'))['metadata']['total_models'])")

          git commit -m "🤖 更新国产模型清单 - $BEIJING_TIME

          - 模型总数: $MODEL_COUNT
          - Workflow: ${{ github.workflow }}
          - Run: #${{ github.run_number }}

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push

  deploy-to-ecs:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    needs: update-models
    # 仅在有数据变化时部署
    if: needs.update-models.outputs.has_changes == 'true'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: domestic-llm-models-${{ github.run_number }}
          path: output/

      - name: Sync files to Alibaba Cloud ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PORT: ${{ secrets.ECS_PORT || '22' }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          echo "📡 检查是否需要同步到阿里云 ECS..."

          # 检查必要的 Secrets 是否配置，未配置则跳过
          if [ -z "$ECS_HOST" ] || [ -z "$ECS_USER" ] || [ -z "$ECS_SSH_KEY" ]; then
            echo "⏭️  ECS 同步未配置，跳过此步骤"
            echo "💡 如需启用，请在 GitHub 仓库 Settings > Secrets 中配置："
            echo "   - ECS_HOST: 服务器地址"
            echo "   - ECS_PORT: SSH 端口（可选，默认 22）"
            echo "   - ECS_USER: SSH 用户名"
            echo "   - ECS_SSH_KEY: SSH 私钥"
            exit 0
          fi

          echo "🚀 开始同步文件到阿里云 ECS..."

          # 设置 SSH 密钥
          mkdir -p ~/.ssh
          echo "$ECS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $ECS_PORT -H $ECS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # 目标路径
          TARGET_DIR="/api_data/llm"

          echo "📂 目标目录: $TARGET_DIR"
          echo "🖥️  服务器: $ECS_USER@$ECS_HOST:$ECS_PORT"

          # 创建目标目录
          echo "创建目录结构..."
          ssh -p $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            $ECS_USER@$ECS_HOST "mkdir -p $TARGET_DIR"

          # 上传 JSON 文件
          if [ -f "output/domestic_llm_models.json" ]; then
            echo "📤 上传 domestic_llm_models.json..."
            scp -P $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              output/domestic_llm_models.json \
              $ECS_USER@$ECS_HOST:$TARGET_DIR/

            # 验证上传的文件
            echo "🔍 验证文件..."
            ssh -p $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              $ECS_USER@$ECS_HOST "ls -lh $TARGET_DIR/domestic_llm_models.json && echo '' && head -20 $TARGET_DIR/domestic_llm_models.json"
          fi

          # 清理私钥
          rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts

          echo "✅ 文件同步完成"

  # 清理旧的 artifacts 以节省存储空间
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs: [update-models, deploy-to-ecs]
    permissions:
      actions: write

    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            // 保留最新的 10 个 artifacts
            if (artifacts.data.total_count > 10) {
              console.log(`当前有 ${artifacts.data.total_count} 个 artifacts，需要清理`);

              // 获取所有 artifacts
              const allArtifacts = await github.paginate(
                github.rest.actions.listArtifactsForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                }
              );

              // 删除超过 10 个的旧 artifacts
              const toDelete = allArtifacts.slice(10);
              for (const artifact of toDelete) {
                console.log(`删除 artifact: ${artifact.name} (ID: ${artifact.id})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
              console.log(`✅ 已删除 ${toDelete.length} 个旧 artifacts`);
            } else {
              console.log(`当前有 ${artifacts.data.total_count} 个 artifacts，无需清理`);
            }
